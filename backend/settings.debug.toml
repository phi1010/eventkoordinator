# Debug/development overrides loaded by Dynaconf.
# This file is intended to keep explicit local defaults in TOML.

ALLOWED_HOSTS = [
    "127.0.0.1",
    "localhost",
]

CSRF_TRUSTED_ORIGINS = [
    "http://127.0.0.1",
    "http://localhost:5173",
    "http://localhost",
    "http://localhost:8000",
]

CORS_ALLOWED_ORIGINS = [
    "http://127.0.0.1",
    "http://127.0.0.1:5173",
    "http://localhost",
    "http://localhost:5173",
    "http://localhost:8000",
]

STATICFILES_DIRS = ["static", "../dist"]
STATIC_ROOT = "staticfiles"
STATIC_URL = "/static/"

SECRET_KEY = "DEBUG_SECRET_KEY"

DEBUG = true

PLAYWRIGHT_HEADLESS = false

PRETIX_API_BASE_URL = "http://localhost:8282/api/v1"

[DATABASES.default]
ENGINE = "django_prometheus.db.backends.postgresql"
NAME = "db"
USER = "user"
PASSWORD = "password"
HOST = "127.0.0.1"
PORT = 5432

[LOGGING]
version = 1
disable_existing_loggers = false
root = { level = "DEBUG", handlers = ["console"] }

[LOGGING.loggers]
django = { level = "INFO", handlers = ["console"], propagate = false }
"django.template" = { level = "INFO", handlers = ["console"], propagate = false }
"django.db.backends" = { level = "INFO", handlers = ["console"], propagate = false }
mozilla_django_oidc = { level = "INFO", handlers = ["console"], propagate = false }
"openid_user_management.models.has_perm" = { level = "INFO", handlers = ["console"], propagate = false }
"apiv1.models.basedata.has_object_permission" = { level = "INFO", handlers = ["console"], propagate = false }

[LOGGING.formatters]
simple = { format = "[{asctime}] {levelname: <10} | {name: <32}: {message}", style = "{" }

[LOGGING.handlers]
console = { class = "logging.StreamHandler", formatter = "simple", stream = "ext://sys.stderr", level = "DEBUG" }
