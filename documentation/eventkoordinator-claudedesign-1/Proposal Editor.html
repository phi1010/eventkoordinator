<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposal Editor – Redesign</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="proposal-components.jsx"></script>
  <script type="text/babel" src="proposal-screens.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "layout": "wizard",
      "accentColor": "#646cff"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS)
      const [screen, setScreen] = React.useState('home')
      const [proposals, setProposals] = React.useState(MOCK_PROPOSALS)
      const [selectedId, setSelectedId] = React.useState(MOCK_PROPOSALS[0].id)

      const handleNewProposal = (callId) => {
        const id = 'new-' + Date.now()
        const newProp = {
          id, title: '', submission_type: '', status: 'draft', callId,
          lastModified: new Date(), area: '', language: 'de',
          abstract: '', description: '', internal_notes: '',
          duration_days: 1, duration_per_day: ['02:00'],
          duration_same_each_day: true, occurrence_count: 1,
          is_basic_course: false, max_participants: 0,
          material_cost_eur: '0.00', preferred_dates: '',
          is_regular_member: false, has_building_access: false,
          editors: [], speakers: [],
        }
        setProposals(prev => [newProp, ...prev])
        setSelectedId(id)
        setScreen('editor')
      }

      return (
        <>
          <Navbar screen={screen} onNav={setScreen} />

          {screen === 'home' && (
            <div style={{ flex:1, overflowY:'auto' }}>
              <HomeScreen
                proposals={proposals}
                onNavigateEditor={id => { setSelectedId(id); setScreen('editor') }}
                onNewProposal={handleNewProposal}
              />
            </div>
          )}

          {screen === 'editor' && (
            <ProposalEditorView
              proposals={proposals}
              selectedId={selectedId}
              onSelect={setSelectedId}
              onNew={() => handleNewProposal(null)}
              layout={t.layout}
            />
          )}

          <TweaksPanel>
            <TweakSection label="Layout-Variante" />
            <TweakRadio
              label="Checkliste"
              value={t.layout}
              options={['split', 'stack', 'wizard']}
              onChange={v => setTweak('layout', v)}
            />
            <TweakSection label="Akzentfarbe" />
            <TweakColor label="Akzent" value={t.accentColor} onChange={v => setTweak('accentColor', v)} />
          </TweaksPanel>
        </>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 80 56" xmlns="http://www.w3.org/2000/svg">
      <rect width="80" height="56" fill="#2c3e50"/>
      <rect x="8" y="12" width="42" height="32" rx="3" fill="#fff" opacity=".95"/>
      <rect x="54" y="12" width="18" height="32" rx="3" fill="#646cff" opacity=".8"/>
      <rect x="12" y="17" width="20" height="2" rx="1" fill="#e5e7eb"/>
      <rect x="12" y="22" width="34" height="2" rx="1" fill="#e5e7eb"/>
      <rect x="12" y="27" width="28" height="2" rx="1" fill="#e5e7eb"/>
      <rect x="12" y="32" width="34" height="2" rx="1" fill="#e5e7eb"/>
      <rect x="12" y="37" width="16" height="4" rx="2" fill="#4caf50"/>
    </svg>
  </template>
</body>
</html>
