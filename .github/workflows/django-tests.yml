name: Django tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  resolve-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Resolve CI image name
        id: meta
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/htmlplayground1-ci-tools:latest" >> "$GITHUB_OUTPUT"

  django-tests:
    runs-on: ubuntu-latest
    needs: resolve-image
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd "pg_isready -U user -d db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    container:
      image: ${{ needs.resolve-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          node --version
          npm --version
          python --version
          uv --version
          psql --version
          pg_isready --version

      - name: Wait for PostgreSQL
        env:
          PGPASSWORD: password
        run: |
          until pg_isready -h postgres -p 5432 -U user -d db; do
            sleep 1
          done
          psql -h postgres -p 5432 -U user -d db -c 'select 1;'

      - name: Install Python dependencies
        run: uv sync --frozen --dev

      - name: Install Node dependencies
        run: npm ci

      - name: Run Django tests
        env:
          DJANGO_DEBUG: "1"
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_OIDC_DISCOVERY_URL: ""
          DJANGO_OIDC_OP_AUTHORIZATION_ENDPOINT: "http://localhost/oidc/authorize"
          DJANGO_OIDC_OP_TOKEN_ENDPOINT: "http://localhost/oidc/token"
          DJANGO_OIDC_OP_USER_ENDPOINT: "http://localhost/oidc/userinfo"
          DJANGO_OIDC_OP_JWKS_ENDPOINT: "http://localhost/oidc/jwks"
          DJANGO_DATABASES__default__ENGINE: django_prometheus.db.backends.postgresql
          DJANGO_DATABASES__default__HOST: postgres
          DJANGO_DATABASES__default__PORT: "5432"
          DJANGO_DATABASES__default__NAME: db
          DJANGO_DATABASES__default__USER: user
          DJANGO_DATABASES__default__PASSWORD: password
        run: |
          cd backend
          uv run python manage.py test

      - name: Upload ARIA snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aria-snapshots-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            backend/test_aria_snapshots/**/*.aria.txt
            backend/test_aria_snapshots/**/*.png


