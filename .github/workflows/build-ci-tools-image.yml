name: Build CI tools image

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  check-image:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      image_repo: ${{ steps.meta.outputs.image_repo }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Resolve image name
        id: meta
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image_repo=ghcr.io/${owner}/htmlplayground1-ci-tools" >> "$GITHUB_OUTPUT"
          echo "image_tag=latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image is missing or older than 7 days
        id: check
        env:
          IMAGE_REPO: ${{ steps.meta.outputs.image_repo }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          # On manual dispatch always build; age check only applies to scheduled runs.
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          if [[ "${FORCE_BUILD}" == "true" ]]; then
            echo "Manual trigger – forcing build."
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          image_ref="${IMAGE_REPO}:${IMAGE_TAG}"
          week_seconds=$((7 * 24 * 60 * 60))

          if ! docker pull "${image_ref}" >/dev/null 2>&1; then
            echo "Image is missing in registry: ${image_ref}"
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          created_at="$(docker image inspect "${image_ref}" --format '{{.Created}}')"
          created_epoch="$(date -d "${created_at}" +%s)"
          now_epoch="$(date -u +%s)"
          age_seconds=$((now_epoch - created_epoch))

          if ((age_seconds >= week_seconds)); then
            echo "Image is older than 7 days (${age_seconds}s): ${image_ref}"
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image is fresh (${age_seconds}s): ${image_ref}"
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-image:
    runs-on: ubuntu-latest
    needs: check-image
    if: needs.check-image.outputs.needs_build == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci-tools
          push: true
          tags: |
            ${{ needs.check-image.outputs.image_repo }}:${{ needs.check-image.outputs.image_tag }}
          build-args: |
            PYTHON_VERSION=3.14
            PLAYWRIGHT_VERSION=1.58.0

